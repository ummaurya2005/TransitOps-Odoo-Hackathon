<div class="main">

<h1>Vehicle Maintenance</h1>

<form id="maintenanceForm">

<input
type="number"
id="vehicle_id"
placeholder="Vehicle ID"
required>

<input
type="text"
id="maintenance_type"
placeholder="Maintenance Type"
required>

<input
type="text"
id="description"
placeholder="Description">

<input
type="number"
id="cost"
placeholder="Cost"
required>

<input
type="date"
id="maintenance_date"
required>

<button type="submit">

Create Maintenance

</button>

</form>

<br>

<table>

<thead>

<tr>

<th>ID</th>
<th>Vehicle</th>
<th>Type</th>
<th>Cost</th>
<th>Status</th>
<th>Complete</th>

</tr>

</thead>

<tbody id="maintenanceTable">

</tbody>

</table>
