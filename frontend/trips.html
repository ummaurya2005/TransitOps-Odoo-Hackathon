<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trips</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="js/api.js"></script>
    <script src="js/trip.js" defer></script>

</head>

<body>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">

<h1>TransitOps Fleet Management</h1>

<span style="font-size:18px;">
🚚 Fleet Dashboard
</span>

</div>
<div class="sidebar">

    <h2>TransitOps</h2>

    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="vehicles.html">🚚 Vehicles</a>
    <a href="drivers.html">👨 Drivers</a>
    <a href="trips.html">🛣 Trips</a>
    <a href="maintenance.html">🔧 Maintenance</a>
    <a href="fuel.html">⛽ Fuel</a>
    <a href="expenses.html">💰 Expenses</a>
    <a href="reports.html">📊 Reports</a>

</div>

<div class="main">

<h1>Trip Management</h1>

<form id="tripForm">

<input
type="text"
id="source"
placeholder="Source"
required>

<input
type="text"
id="destination"
placeholder="Destination"
required>

<input
type="number"
id="vehicle_id"
placeholder="Vehicle ID"
required>

<input
type="number"
id="driver_id"
placeholder="Driver ID"
required>

<input
type="number"
id="cargo_weight"
placeholder="Cargo Weight"
required>

<input
type="number"
id="planned_distance"
placeholder="Distance"
required>

<input
type="date"
id="trip_date"
required>

<button type="submit">

Create Trip

</button>

</form>

<br>

<table>

<thead>

<tr>

<th>ID</th>
<th>Source</th>
<th>Destination</th>
<th>Vehicle</th>
<th>Driver</th>
<th>Status</th>
<th>Dispatch</th>
<th>Complete</th>
<th>Cancel</th>

</tr>

</thead>

<tbody id="tripTable">

</tbody>

</table>

</div>

</body>

</html>
