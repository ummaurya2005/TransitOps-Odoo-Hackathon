<h1>Driver Management</h1>

<form id="driverForm">

<input
type="text"
id="name"
placeholder="Driver Name"
required>

<input
type="text"
id="license_number"
placeholder="License Number"
required>

<input
type="text"
id="license_category"
placeholder="License Category"
required>

<input
type="date"
id="license_expiry_date"
required>

<input
type="text"
id="contact_number"
placeholder="Contact Number"
required>

<input
type="number"
id="safety_score"
placeholder="Safety Score"
required>

<button type="submit">

Add Driver

</button>

</form>

<br>

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>License</th>
<th>Category</th>
