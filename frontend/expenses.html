<div class="main">

<h1>Expense Management</h1>

<form id="expenseForm">

<input
type="number"
id="vehicle_id"
placeholder="Vehicle ID"
required>

<input
type="text"
id="expense_type"
placeholder="Expense Type"
required>

<input
type="number"
id="amount"
placeholder="Amount"
required>

<input
type="text"
id="description"
placeholder="Description">

<input
type="date"
id="expense_date"
required>

<button type="submit">

Add Expense

</button>

</form>

<br>

<table>

<thead>

<tr>

<th>ID</th>
<th>Vehicle</th>
<th>Type</th>
<th>Amount</th>
<th>Date</th>

</tr>

</thead>

<tbody id="expenseTable">

</tbody>

</table>
